<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX Pro - 無限離線版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .bg-glow { position: fixed; width: 400px; height: 400px; background: #3b82f6; filter: blur(150px); opacity: 0.12; z-index: -1; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .opt-btn { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(51, 65, 85, 1); transition: 0.2s; }
        .opt-btn:active { transform: scale(0.96); background: rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-4">
    <div class="bg-glow"></div>
    
    <div class="glass max-w-md w-full p-8 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="text-4xl font-black italic mb-2 text-blue-500">StudyX <span class="text-white">PRO</span></h1>
        <p class="text-slate-500 text-[10px] tracking-[0.4em] font-bold mb-10 uppercase">Offline Turbo Mode</p>

        <div id="box" class="min-h-[280px] flex flex-col justify-center text-left">
            <div id="quiz-ui" class="hidden space-y-5">
                <div id="question" class="text-lg font-bold p-6 bg-slate-900/80 rounded-3xl border border-slate-800 leading-relaxed shadow-inner"></div>
                <div id="options" class="grid gap-3"></div>
            </div>
            
            <div id="welcome" class="text-center py-10">
                <div class="text-6xl mb-4">⚡</div>
                <h2 class="text-xl font-bold text-slate-200">極速出題模式</h2>
                <p class="text-slate-500 mt-2">已跳過不穩定的 API 連線</p>
            </div>
        </div>

        <div id="feedback" class="hidden mt-6 p-4 rounded-2xl font-black text-sm text-center"></div>

        <button id="btn" onclick="generate()" class="w-full mt-10 bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl text-xl font-bold shadow-xl transition-all active:scale-95">
            下一題挑战
        </button>
    </div>

    <script>
        // 內建 100% 穩定的數學邏輯題庫
        function generate() {
            const qDiv = document.getElementById('question');
            const oDiv = document.getElementById('options');
            const fDiv = document.getElementById('feedback');
            const btn = document.getElementById('btn');
            
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            fDiv.classList.add('hidden');
            btn.innerText = "下一題";

            const types = [
                () => { // 一元一次
                    const x = Math.floor(Math.random() * 12) + 2;
                    const a = Math.floor(Math.random() * 7) + 2;
                    const b = Math.floor(Math.random() * 20) + 1;
                    return { q: `若 ${a}x + ${b} = ${a*x+b}，則 x = ?`, a: x, o: [x, x+2, x-1, x+5] };
                },
                () => { // 負數運算
                    const n1 = Math.floor(Math.random() * 40) + 10;
                    const n2 = Math.floor(Math.random() * 40) + 10;
                    return { q: `計算 ( -${n1} ) - ( -${n2} ) = ?`, a: n2-n1, o: [n2-n1, -(n1+n2), n1-n2, n1+n2] };
                },
                () => { // 面積
                    const w = Math.floor(Math.random() * 10) + 5;
                    const h = Math.floor(Math.random() * 8) + 3;
                    return { q: `一長方形的長為 ${w}，寬為 ${h}，其面積為何？`, a: w*h, o: [w*h, w+h, (w+h)*2, w*h/2] };
                }
            ];

            const quiz = types[Math.floor(Math.random() * types.length)]();
            qDiv.innerText = quiz.q;
            oDiv.innerHTML = "";
            
            // 隨機排序選項
            quiz.o.sort(() => Math.random() - 0.5).forEach(opt => {
                const b = document.createElement('button');
                b.innerText = opt;
                b.className = "opt-btn w-full p-5 text-left rounded-2xl text-slate-200 font-semibold";
                b.onclick = () => {
                    fDiv.classList.remove('hidden');
                    if(opt == quiz.a) {
                        fDiv.innerText = "✨ 正確答案！";
                        fDiv.className = "mt-6 p-4 rounded-2xl text-center bg-green-500/20 text-green-400 border border-green-500/30";
                    } else {
                        fDiv.innerText = "❌ 答錯了，正確答案是：" + quiz.a;
                        fDiv.className = "mt-6 p-4 rounded-2xl text-center bg-red-500/20 text-red-400 border border-red-500/30";
                    }
                };
                oDiv.appendChild(b);
            });
        }
    </script>
</body>
</html>
