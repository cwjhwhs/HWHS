<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI 刷題</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-gray-100">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-blue-600">StudyX AI</h1>
            <p class="text-gray-400 text-sm mt-1">無限智能題庫</p>
        </div>

        <div id="main-content" class="min-h-[300px]">
            <div id="quiz-box" class="hidden animate-slide">
                <div id="question" class="text-xl font-bold text-gray-800 bg-blue-50 p-6 rounded-3xl mb-6 leading-relaxed"></div>
                <div id="options" class="grid gap-3"></div>
            </div>

            <div id="welcome" class="text-center py-10">
                <div class="text-6xl mb-4">📖</div>
                <p class="text-gray-500">準備好開始練習了嗎？</p>
            </div>
        </div>

        <div id="result" class="hidden mt-6 p-4 rounded-2xl text-center font-bold animate-slide"></div>

        <button id="btn" onclick="getQuiz()" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all">
            🎯 開始出題
        </button>
    </div>

    <script>
        const KEY = "AIzaSyBpMbieq3C1IKMDwjPp2Bf7EM8DWSjZVP8";
        
        // 備用題庫（防止 API 抽風）
        const backupQuiz = [
            {q: "若 2x + 5 = 13，則 x = ?", o: ["2", "4", "6", "8"], a: "4"},
            {q: "下列何者為質數？", o: ["9", "15", "17", "21"], a: "17"}
        ];

        async function getQuiz() {
            const btn = document.getElementById('btn');
            const qBox = document.getElementById('quiz-box');
            const wel = document.getElementById('welcome');
            const res = document.getElementById('result');
            const qDiv = document.getElementById('question');
            const oDiv = document.getElementById('options');

            btn.innerText = "⚡ AI 思考中...";
            btn.disabled = true;
            res.classList.add('hidden');

            const prompt = "請出一道國中數學選擇題(繁體中文)。格式: {\"q\":\"題目\",\"o\":[\"A\",\"B\",\"C\",\"D\"],\"a\":\"正確答案\"}。只給 JSON。";

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await resp.json();
                let text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                render(JSON.parse(text));
            } catch (e) {
                console.log("使用備用題庫");
                render(backupQuiz[Math.floor(Math.random() * backupQuiz.length)]);
            }

            function render(quiz) {
                wel.classList.add('hidden');
                qBox.classList.remove('hidden');
                qDiv.innerText = quiz.q;
                oDiv.innerHTML = "";
                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "w-full p-4 text-left border-2 border-gray-100 rounded-2xl hover:bg-blue-50 hover:border-blue-500 transition-all font-semibold";
                    b.onclick = () => {
                        res.classList.remove('hidden');
                        if(opt.includes(quiz.a) || quiz.a.includes(opt)) {
                            res.innerText = "✅ 答對了！";
                            res.className = "mt-6 p-4 rounded-2xl text-center font-bold bg-green-100 text-green-700 animate-slide";
                        } else {
                            res.innerText = "❌ 答錯了，答案是：" + quiz.a;
                            res.className = "mt-6 p-4 rounded-2xl text-center font-bold bg-red-100 text-red-700 animate-slide";
                        }
                        btn.innerText = "下一題 ➡️";
                        btn.disabled = false;
                    };
                    oDiv.appendChild(b);
                });
            }
        }
    </script>
</body>
</html>
