<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        .glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; background: #3b82f6; filter: blur(120px); opacity: 0.15; z-index: -1; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .option-btn { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(51, 65, 85, 1); transition: 0.2s; }
        .option-btn:hover { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glow"></div>
    
    <div class="glass max-w-md w-full p-8 rounded-[2.5rem] relative overflow-hidden">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter italic text-blue-500">StudyX <span class="text-white">AI</span></h1>
            <p class="text-slate-500 text-[10px] mt-1 font-bold uppercase tracking-[0.3em]">Next Gen Learning</p>
        </div>

        <div id="box" class="min-h-[280px] flex flex-col justify-center">
            <div id="welcome" class="text-center">
                <div class="text-5xl mb-4">🚀</div>
                <h2 class="text-xl font-bold mb-2 text-slate-200">準備好挑戰了嗎？</h2>
                <p class="text-slate-500 text-sm">點擊按鈕，召喚 AI 題目</p>
            </div>

            <div id="quiz" class="hidden space-y-5">
                <div id="q" class="text-lg font-bold p-6 bg-slate-900/50 rounded-3xl border border-slate-800 leading-relaxed shadow-inner"></div>
                <div id="opts" class="grid gap-3"></div>
            </div>
        </div>

        <div id="fb" class="hidden mt-6 p-4 rounded-2xl text-center font-bold text-sm"></div>

        <button id="btn" onclick="go()" class="w-full mt-10 bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl text-xl font-bold shadow-xl shadow-blue-900/20 active:scale-95 transition-all">
            開始出題
        </button>
    </div>

    <script>
        const KEY = "AIzaSyBpMbieq3C1IKMDwjPp2Bf7EM8DWSjZVP8";

        async function go() {
            const btn = document.getElementById('btn');
            const wel = document.getElementById('welcome');
            const qiz = document.getElementById('quiz');
            const qT = document.getElementById('q');
            const oD = document.getElementById('opts');
            const fD = document.getElementById('fb');

            btn.disabled = true;
            btn.innerText = "⚡ AI 思考中...";
            fD.classList.add('hidden');

            const prompt = "隨機出一道國中數學題(繁體中文)。格式:{\"q\":\"題目\",\"o\":[\"A\",\"B\",\"C\",\"D\"],\"a\":\"正確答案\"}。只回傳 JSON，數值要隨機且不可重複。";

            try {
                // 改用更穩定的 V1 版本
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${KEY}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await res.json();
                let txt = data.candidates[0].content.parts[0].text;
                
                // 強力清洗 JSON，防止 AI 亂噴字
                const match = txt.match(/\{[\s\S]*\}/);
                if (!match) throw new Error();
                const quiz = JSON.parse(match[0]);

                wel.classList.add('hidden');
                qiz.classList.remove('hidden');
                qT.innerText = quiz.q;
                oD.innerHTML = "";

                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "option-btn w-full p-4 text-left rounded-2xl text-slate-300 font-medium";
                    b.onclick = () => {
                        fD.classList.remove('hidden');
                        if (opt === quiz.a || opt.includes(quiz.a) || quiz.a.includes(opt)) {
                            fD.innerText = "✨ 答對了！";
                            fD.className = "mt-6 p-4 rounded-2xl text-center bg-green-500/20 text-green-400 border border-green-500/30";
                        } else {
                            fD.innerText = "❌ 答錯，正確是：" + quiz.a;
                            fD.className = "mt-6 p-4 rounded-2xl text-center bg-red-500/20 text-red-400 border border-red-500/30";
                        }
                        btn.disabled = false;
                        btn.innerText = "下一題挑戰";
                    };
                    oD.appendChild(b);
                });

            } catch (e) {
                console.error(e);
                alert("AI 目前忙碌中，請再點一次按鈕！");
                btn.disabled = false;
                btn.innerText = "重新出題";
            }
        }
    </script>
</body>
</html>
