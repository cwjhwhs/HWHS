<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            color: white;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-btn:active { transform: scale(0.97); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-pop { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-card max-w-md w-full p-8 rounded-[2.5rem] animate-pop">
        <div class="text-center mb-10">
            <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-bold tracking-widest uppercase mb-3">
                AI Powered Learning
            </div>
            <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-300">StudyX AI</h1>
        </div>

        <div id="quiz-container" class="min-h-[300px] flex flex-col justify-center">
            <div id="welcome-view" class="text-center space-y-6">
                <div class="w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto ring-4 ring-blue-500/10">
                    <span class="text-4xl">🎓</span>
                </div>
                <div class="space-y-2">
                    <h2 class="text-xl font-bold text-slate-200">準備好開始了嗎？</h2>
                    <p class="text-slate-400 text-sm leading-relaxed">題目由 Gemini 1.5 Flash 即時生成<br>針對國中數學範疇設計</p>
                </div>
            </div>

            <div id="quiz-view" class="hidden space-y-6 animate-pop">
                <div id="question" class="text-lg font-bold bg-slate-900/50 p-6 rounded-3xl border border-slate-700 leading-relaxed shadow-inner">
                    </div>
                <div id="options" class="grid gap-3">
                    </div>
            </div>
        </div>

        <div id="feedback" class="hidden mt-6 p-4 rounded-2xl text-center font-black text-sm animate-pop"></div>

        <button id="main-btn" onclick="startQuiz()" class="w-full mt-10 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-5 rounded-[1.5rem] text-xl font-bold shadow-lg shadow-blue-900/40 transition-all active:scale-95 disabled:opacity-50">
            開始出題
        </button>
    </div>

    <script>
        const API_KEY = "AIzaSyBpMbieq3C1IKMDwjPp2Bf7EM8DWSjZVP8";

        async function startQuiz() {
            const btn = document.getElementById('main-btn');
            const welcome = document.getElementById('welcome-view');
            const quizView = document.getElementById('quiz-view');
            const qText = document.getElementById('question');
            const oDiv = document.getElementById('options');
            const fDiv = document.getElementById('feedback');

            btn.disabled = true;
            btn.innerHTML = `<span class="flex items-center justify-center gap-3">
                <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                AI 正在思考...
            </span>`;
            fDiv.classList.add('hidden');

            const topics = ["代數方程式", "平面幾何", "機率與統計", "函數圖形", "相似形", "二次根式"];
            const topic = topics[Math.floor(Math.random() * topics.length)];
            const prompt = `請出一道國中${topic}題目(繁體中文)。格式 JSON: {"q":"題目內容","o":["選項1","選項2","選項3","選項4"],"a":"正確答案文字"}。嚴禁任何解釋。`;

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await resp.json();
                const raw = data.candidates[0].content.parts[0].text;
                const jsonStr = raw.match(/\{[\s\S]*\}/)[0];
                const quiz = JSON.parse(jsonStr);

                welcome.classList.add('hidden');
                quizView.classList.remove('hidden');
                qText.innerText = quiz.q;
                oDiv.innerHTML = "";

                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "option-btn w-full p-4 text-left bg-slate-800/50 hover:bg-blue-500/20 border border-slate-700 hover:border-blue-500/50 rounded-2xl text-slate-200 font-medium";
                    b.onclick = () => {
                        fDiv.classList.remove('hidden');
                        if (opt === quiz.a || opt.includes(quiz.a) || quiz.a.includes(opt)) {
                            fDiv.innerText = "✨ 太強了！答對了";
                            fDiv.className = "mt-6 p-4 rounded-2xl text-center font-black bg-green-500/20 text-green-400 border border-green-500/30 animate-pop";
                        } else {
                            fDiv.innerText = "💡 差一點，正確答案是：" + quiz.a;
                            fDiv.className = "mt-6 p-4 rounded-2xl text-center font-black bg-red-500/20 text-red-400 border border-red-500/30 animate-pop";
                        }
                        btn.disabled = false;
                        btn.innerText = "下一題挑戰";
                    };
                    oDiv.appendChild(b);
                });

            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerText = "重新出題";
                alert("連線稍微不穩，請再試一次！");
            }
        }
    </script>
</body>
</html>
