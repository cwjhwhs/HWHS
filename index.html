<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI 真正的無限題庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
        <h1 class="text-3xl font-black text-blue-600 text-center mb-8">StudyX AI</h1>

        <div id="quiz-area" class="min-h-[300px]">
            <div id="quiz-display" class="hidden space-y-6">
                <div id="question" class="text-xl font-bold text-slate-800 bg-slate-50 p-6 rounded-3xl border border-slate-100 leading-relaxed"></div>
                <div id="options" class="grid gap-3"></div>
            </div>

            <div id="intro" class="text-center py-10">
                <div class="text-6xl mb-4">💡</div>
                <p class="text-slate-500 font-medium">100% 串接 Gemini 1.5 Flash<br>點擊下方開始生成</p>
            </div>
        </div>

        <div id="feedback" class="hidden mt-6 p-4 rounded-2xl text-center font-bold"></div>

        <button id="main-btn" onclick="askAI()" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-bold shadow-lg active:scale-95 transition-all">
            🎯 生成全新 AI 題目
        </button>
    </div>

    <script>
        const API_KEY = "AIzaSyBpMbieq3C1IKMDwjPp2Bf7EM8DWSjZVP8";

        async function askAI() {
            const btn = document.getElementById('main-btn');
            const qDisplay = document.getElementById('quiz-display');
            const intro = document.getElementById('intro');
            const qDiv = document.getElementById('question');
            const oDiv = document.getElementById('options');
            const fDiv = document.getElementById('feedback');

            btn.disabled = true;
            btn.innerText = "⚡ AI 正在構造空間與數字...";
            fDiv.classList.add('hidden');

            // 隨機選取難度與主題，確保多樣性
            const topics = ["二次函數", "相似形", "機率與統計", "圓形性質", "勾股定理", "等差數列", "一元二次方程式"];
            const selectedTopic = topics[Math.floor(Math.random() * topics.length)];
            const randomID = Math.random().toString(36).substring(7);

            const prompt = `任務編號:${randomID}。請出一道繁體中文的國中數學選擇題。
            主題：${selectedTopic}。
            要求：數值必須隨機，題目敘述要生動，嚴禁重複。
            輸出格式(純JSON): {"q":"題目","o":["選項1","選項2","選項3","選項4"],"a":"正確答案文字"}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
                    cache: "no-store" // 強制不使用緩存
                });

                const data = await response.json();
                
                if (!data.candidates) {
                    throw new Error(JSON.stringify(data));
                }

                let text = data.candidates[0].content.parts[0].text;
                const jsonStr = text.match(/\{[\s\S]*\}/)[0];
                const quiz = JSON.parse(jsonStr);

                // 成功抓到題目後才切換介面
                intro.classList.add('hidden');
                qDisplay.classList.remove('hidden');
                qDiv.innerText = quiz.q;
                oDiv.innerHTML = "";

                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "w-full p-4 text-left border-2 border-slate-100 rounded-2xl hover:bg-blue-50 hover:border-blue-500 transition-all font-semibold text-slate-700";
                    b.onclick = () => {
                        fDiv.classList.remove('hidden');
                        if (opt === quiz.a || opt.includes(quiz.a) || quiz.a.includes(opt)) {
                            fDiv.innerText = "🎉 答對了！這題沒難倒你！";
                            fDiv.className = "mt-6 p-4 rounded-2xl text-center font-bold bg-green-100 text-green-700";
                        } else {
                            fDiv.innerText = "❌ 答錯了，正確答案是：" + quiz.a;
                            fDiv.className = "mt-6 p-4 rounded-2xl text-center font-bold bg-red-100 text-red-700";
                        }
                        btn.disabled = false;
                        btn.innerText = "換下一題挑戰 ➡️";
                    };
                    oDiv.appendChild(b);
                });

            } catch (err) {
                console.error(err);
                alert("AI 連線失敗！原因可能：\n1. API Key 被限制\n2. 網路擋住 Google API\n錯誤代碼：" + err.message.substring(0, 50));
                btn.disabled = false;
                btn.innerText = "點我重試";
            }
        }
    </script>
</body>
</html>
