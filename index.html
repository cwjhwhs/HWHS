<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI 刷題平台</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-white shadow-2xl rounded-[2rem] p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-600 tracking-tight">StudyX AI</h1>
            <div class="h-1 w-12 bg-blue-600 mx-auto mt-2 rounded-full"></div>
        </div>

        <div id="quiz-box" class="hidden space-y-6 animate-fade-in">
            <div id="question" class="text-xl font-bold text-slate-800 leading-relaxed bg-slate-50 p-6 rounded-2xl border border-slate-100">
                </div>
            
            <div id="options" class="grid gap-3">
                </div>

            <div id="result" class="hidden p-5 rounded-2xl font-bold text-center text-lg shadow-inner">
                </div>
        </div>

        <div id="empty-state" class="py-10 text-center">
            <div class="text-6xl mb-4">🎯</div>
            <p class="text-slate-500">準備好接受 AI 的挑戰了嗎？</p>
        </div>

        <button id="action-btn" onclick="generateQuiz()" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all flex items-center justify-center gap-2">
            <span>開始 AI 出題</span>
        </button>
    </div>

    <script>
        const API_KEY = "AIzaSyBpMbieq3C1IKMDwjPp2Bf7EM8DWSjZVP8";

        async function generateQuiz() {
            const btn = document.getElementById('action-btn');
            const quizBox = document.getElementById('quiz-box');
            const emptyState = document.getElementById('empty-state');
            const qDiv = document.getElementById('question');
            const oDiv = document.getElementById('options');
            const rDiv = document.getElementById('result');

            // 讀取狀態
            btn.innerHTML = `<svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 思考題目中...`;
            btn.disabled = true;
            rDiv.classList.add('hidden');

            const prompt = "請出一道國中數學選擇題(繁體中文)。輸出格式請嚴格遵守 JSON：{\"q\":\"題目內容\",\"o\":[\"選項1\",\"選項2\",\"選項3\",\"選項4\"],\"a\":\"正確答案文字\"}。請直接回傳 JSON 內容，不要包含 ```json 或其餘說明文字。";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;
                
                // 清洗可能的 Markdown 標籤
                const cleanJson = rawText.replace(/```json|```/g, "").trim();
                const quiz = JSON.parse(cleanJson);

                // 更新介面
                emptyState.classList.add('hidden');
                quizBox.classList.remove('hidden');
                qDiv.innerText = quiz.q;
                oDiv.innerHTML = "";
                
                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "w-full p-5 text-left border-2 border-slate-100 rounded-2xl hover:bg-blue-50 hover:border-blue-500 transition-all font-semibold text-slate-700";
                    b.onclick = () => {
                        rDiv.classList.remove('hidden');
                        // 判斷邏輯：如果選項包含正確答案，或正確答案包含選項
                        if (opt === quiz.a || opt.includes(quiz.a) || quiz.a.includes(opt)) {
                            rDiv.innerText = "🎉 答對了！你太強了！";
                            rDiv.className = "p-5 rounded-2xl font-bold text-center text-lg bg-green-50 text-green-700 border border-green-100";
                        } else {
                            rDiv.innerText = "❌ 答錯了！正確答案是：" + quiz.a;
                            rDiv.className = "p-5 rounded-2xl font-bold text-center text-lg bg-red-50 text-red-700 border border-red-100";
                        }
                        btn.innerHTML = "下一題 ➡️";
                        btn.disabled = false;
                        btn.classList.remove('hidden');
                    };
                    oDiv.appendChild(b);
                });

                btn.classList.add('hidden');

            } catch (error) {
                console.error(error);
                alert("AI 出題遇到一點問題，請再試一次！");
                btn.innerHTML = "重新嘗試";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
