<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI 刷題平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl p-8 text-center">
        <h1 class="text-4xl font-black text-blue-600 mb-2">StudyX</h1>
        <p class="text-slate-500 mb-8">AI 無限題目練習</p>

        <div id="quiz-container" class="hidden text-left space-y-4">
            <div id="question" class="text-xl font-bold text-slate-800 bg-slate-100 p-4 rounded-2xl"></div>
            <div id="options" class="grid gap-3"></div>
            <div id="feedback" class="hidden p-4 rounded-2xl font-bold"></div>
        </div>

        <button id="start-btn" onclick="fetchQuiz()" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-xl font-bold shadow-lg active:scale-95 transition-all">
            🎯 開始 AI 出題
        </button>
    </div>

    <script>
        // 總工程師提醒：把你的 Gemini Key 填在這裡 (暫時測試用)
        const API_KEY = "你的_GEMINI_API_KEY"; 

        async function fetchQuiz() {
            const btn = document.getElementById('start-btn');
            const container = document.getElementById('quiz-container');
            const qDiv = document.getElementById('question');
            const oDiv = document.getElementById('options');
            const fDiv = document.getElementById('feedback');

            btn.innerText = "AI 思考中...";
            btn.disabled = true;

            const prompt = "請出一道國中數學題(JSON格式): { 'q': '題目', 'o': ['A','B','C','D'], 'a': '正確答案' }";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "");
                const quiz = JSON.parse(rawText);

                // 顯示介面
                btn.classList.add('hidden');
                container.classList.remove('hidden');
                fDiv.classList.add('hidden');
                
                qDiv.innerText = quiz.q;
                oDiv.innerHTML = "";
                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "w-full p-4 border-2 border-slate-200 rounded-xl hover:bg-blue-50 hover:border-blue-500 transition text-left";
                    b.onclick = () => {
                        fDiv.classList.remove('hidden');
                        if(opt === quiz.a) {
                            fDiv.innerText = "🎉 答對了！";
                            fDiv.className = "p-4 rounded-2xl font-bold bg-green-100 text-green-700";
                        } else {
                            fDiv.innerText = "❌ 再想想看，答案是：" + quiz.a;
                            fDiv.className = "p-4 rounded-2xl font-bold bg-red-100 text-red-700";
                        }
                        setTimeout(() => { btn.classList.remove('hidden'); btn.innerText = "下一題 ➡️"; btn.disabled = false; }, 2000);
                    };
                    oDiv.appendChild(b);
                });
            } catch (err) {
                alert("API 連線失敗，請檢查 Key 是否正確");
                btn.innerText = "重試";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
