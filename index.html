<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-center; }
        .bg-glow { position: fixed; width: 400px; height: 400px; background: #3b82f6; filter: blur(150px); opacity: 0.1; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .opt-btn { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(51, 65, 85, 0.8); transition: all 0.2s; }
        .opt-btn:hover { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-in { animation: scaleIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4">
    <div class="bg-glow"></div>
    
    <div class="glass max-w-md w-full p-8 rounded-[3rem] animate-in text-center">
        <h1 class="text-4xl font-black italic mb-2 bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">StudyX <span class="text-white">AI</span></h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold mb-10">Intelligence System</p>

        <div id="container" class="min-h-[320px] flex flex-col justify-center">
            <div id="start-ui">
                <div class="text-6xl mb-6">🌩️</div>
                <h2 class="text-xl font-bold text-slate-200">準備好挑戰了嗎？</h2>
                <p class="text-slate-500 mt-2">100% 雲端即時運算</p>
            </div>

            <div id="quiz-ui" class="hidden space-y-5 text-left">
                <div id="question" class="text-lg font-bold p-6 bg-slate-900/80 rounded-[2rem] border border-slate-800 leading-relaxed"></div>
                <div id="options" class="grid gap-3"></div>
            </div>
        </div>

        <div id="feedback" class="hidden mt-6 p-4 rounded-2xl font-black text-sm"></div>

        <button id="btn" onclick="fetchAI()" class="w-full mt-10 bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-[1.5rem] text-xl font-bold shadow-xl shadow-blue-900/30 active:scale-95 transition-all">
            開始出題
        </button>
    </div>

    <script>
        const API_KEY = "AIzaSyBpMbieq3C1IKMDwjPp2Bf7EM8DWSjZVP8";

        async function fetchAI() {
            const btn = document.getElementById('btn');
            const startUI = document.getElementById('start-ui');
            const quizUI = document.getElementById('quiz-ui');
            const qDiv = document.getElementById('question');
            const oDiv = document.getElementById('options');
            const fDiv = document.getElementById('feedback');

            btn.disabled = true;
            btn.innerHTML = `<span class="flex items-center justify-center gap-2">思考中...</span>`;
            fDiv.classList.add('hidden');

            const prompt = "出一道國中數學隨機題(繁中)。格式:{\"q\":\"題目\",\"o\":[\"A\",\"B\",\"C\",\"D\"],\"a\":\"正確答案\"}。只要JSON，不要廢話。";

            try {
                // 使用最穩定的請求連結
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                
                // 檢查 Google 是否有回傳內容
                if (!data.candidates) throw new Error();

                let text = data.candidates[0].content.parts[0].text;
                const match = text.match(/\{[\s\S]*\}/);
                if (!match) throw new Error();
                const quiz = JSON.parse(match[0]);

                startUI.classList.add('hidden');
                quizUI.classList.remove('hidden');
                qDiv.innerText = quiz.q;
                oDiv.innerHTML = "";

                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "opt-btn w-full p-5 text-left rounded-2xl text-slate-200 font-semibold";
                    b.onclick = () => {
                        fDiv.classList.remove('hidden');
                        if (opt === quiz.a || opt.includes(quiz.a) || quiz.a.includes(opt)) {
                            fDiv.innerText = "✨ 完美解答！";
                            fDiv.className = "mt-6 p-4 rounded-2xl text-center bg-green-500/20 text-green-400 border border-green-500/30";
                        } else {
                            fDiv.innerText = "❌ 答錯，答案是：" + quiz.a;
                            fDiv.className = "mt-6 p-4 rounded-2xl text-center bg-red-500/20 text-red-400 border border-red-500/30";
                        }
                        btn.disabled = false;
                        btn.innerText = "再抽一題";
                    };
                    oDiv.appendChild(b);
                });

            } catch (e) {
                // 如果失敗，靜默重試一次，不彈出煩人的視窗
                console.log("Retrying...");
                setTimeout(fetchAI, 500); 
            }
        }
    </script>
</body>
</html>
