<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI 刷題</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .animate-pop { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-8 border border-slate-200">
        <h1 class="text-3xl font-black text-blue-600 text-center mb-8">StudyX AI</h1>

        <div id="display-area" class="min-h-[250px] flex flex-col justify-center">
            <div id="guide" class="text-center space-y-4">
                <div class="text-5xl">🤖</div>
                <p class="text-slate-500 font-medium">100% 原生 AI 出題中...</p>
            </div>

            <div id="quiz-content" class="hidden animate-pop space-y-6">
                <div id="question" class="text-xl font-bold text-slate-800 bg-slate-50 p-6 rounded-2xl border border-slate-100 leading-relaxed"></div>
                <div id="options" class="grid gap-3"></div>
            </div>
        </div>

        <div id="feedback" class="hidden mt-6 p-4 rounded-xl text-center font-bold animate-pop"></div>

        <button id="main-btn" onclick="askAI()" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-bold shadow-lg active:scale-95 transition-all">
            🎯 開始 AI 出題
        </button>
    </div>

    <script>
        const API_KEY = "AIzaSyBpMbieq3C1IKMDwjPp2Bf7EM8DWSjZVP8";

        async function askAI() {
            const btn = document.getElementById('main-btn');
            const guide = document.getElementById('guide');
            const content = document.getElementById('quiz-content');
            const qDiv = document.getElementById('question');
            const oDiv = document.getElementById('options');
            const fDiv = document.getElementById('feedback');

            // 進入讀取狀態
            btn.disabled = true;
            btn.innerText = "⚡ AI 運算中...";
            fDiv.classList.add('hidden');

            // 強大的 Prompt 指令
            const prompt = "請出一道國中數學題(繁體中文)。格式嚴格限制為 JSON: {\"q\":\"題目\",\"o\":[\"A選項\",\"B選項\",\"C選項\",\"D選項\"],\"a\":\"正確答案內容\"}。不要有任何解釋，只要 JSON。";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                
                // 檢查 AI 是否有正常回傳內容
                if (!data.candidates || !data.candidates[0]) throw new Error("AI 沒回傳");

                let rawText = data.candidates[0].content.parts[0].text;
                
                // 強力清洗 JSON (去掉可能存在的 ```json 等標籤)
                const jsonStr = rawText.match(/\{[\s\S]*\}/)[0];
                const quiz = JSON.parse(jsonStr);

                // 顯示題目
                guide.classList.add('hidden');
                content.classList.remove('hidden');
                qDiv.innerText = quiz.q;
                oDiv.innerHTML = "";

                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "w-full p-4 text-left border-2 border-slate-100 rounded-xl hover:bg-blue-50 hover:border-blue-500 transition-all font-semibold text-slate-700";
                    b.onclick = () => {
                        fDiv.classList.remove('hidden');
                        // 判斷對錯
                        if (opt === quiz.a || opt.includes(quiz.a) || quiz.a.includes(opt)) {
                            fDiv.innerText = "🎉 答對了！AI 也難不倒你！";
                            fDiv.className = "mt-6 p-4 rounded-xl text-center font-bold bg-green-100 text-green-700 animate-pop";
                        } else {
                            fDiv.innerText = "❌ 答錯了！答案是：" + quiz.a;
                            fDiv.className = "mt-6 p-4 rounded-xl text-center font-bold bg-red-100 text-red-700 animate-pop";
                        }
                        btn.disabled = false;
                        btn.innerText = "下一題 ➡️";
                    };
                    oDiv.appendChild(b);
                });

            } catch (err) {
                console.error(err);
                alert("AI 請求超時或被攔截，請再試一次！");
                btn.disabled = false;
                btn.innerText = "重試出題";
            }
        }
    </script>
</body>
</html>
