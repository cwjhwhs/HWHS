<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyX AI - GitHub 版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; min-h-screen: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-pop { animation: pop 0.3s ease-out forwards; }
    </style>
</head>
<body class="flex items-center justify-center p-4 min-h-screen">

    <div class="glass max-w-md w-full p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-400">StudyX AI</h1>
            <p class="text-slate-400 text-xs mt-2 tracking-widest uppercase">Hosted on GitHub</p>
        </div>

        <div id="quiz-area" class="min-h-[250px] flex flex-col justify-center">
            <div id="quiz-ui" class="hidden animate-pop space-y-6">
                <div id="question" class="text-lg font-bold bg-slate-900/80 p-6 rounded-2xl border border-blue-500/20 leading-relaxed"></div>
                <div id="options" class="grid gap-3"></div>
            </div>

            <div id="welcome-ui" class="text-center space-y-4">
                <div class="text-6xl animate-bounce">🍎</div>
                <h2 class="text-xl font-bold text-slate-200">準備好挑戰了嗎？</h2>
            </div>
        </div>

        <div id="feedback" class="hidden mt-6 p-4 rounded-xl text-center font-bold animate-pop"></div>

        <button id="btn" onclick="askAI()" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl text-xl font-bold shadow-lg transition-all active:scale-95">
            開始 AI 出題
        </button>
    </div>

    <script>
        const API_KEY = "AIzaSyBpMbieq3C1IKMDwjPp2Bf7EM8DWSjZVP8";

        async function askAI() {
            const btn = document.getElementById('btn');
            const quizUI = document.getElementById('quiz-ui');
            const welcomeUI = document.getElementById('welcome-ui');
            const qDiv = document.getElementById('question');
            const oDiv = document.getElementById('options');
            const fDiv = document.getElementById('feedback');

            btn.disabled = true;
            btn.innerText = "🌀 AI 傳輸中...";
            fDiv.classList.add('hidden');

            const topics = ["代數", "幾何", "機率", "統計", "函數"];
            const topic = topics[Math.floor(Math.random() * topics.length)];
            const prompt = `請出一道國中${topic}題目(繁體中文)。格式 JSON: {"q":"題目","o":["A","B","C","D"],"a":"正確答案內容"}。只要JSON。`;

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await resp.json();
                const raw = data.candidates[0].content.parts[0].text;
                const jsonStr = raw.match(/\{[\s\S]*\}/)[0];
                const quiz = JSON.parse(jsonStr);

                welcomeUI.classList.add('hidden');
                quizUI.classList.remove('hidden');
                qDiv.innerText = quiz.q;
                oDiv.innerHTML = "";

                quiz.o.forEach(opt => {
                    const b = document.createElement('button');
                    b.innerText = opt;
                    b.className = "w-full p-4 text-left bg-slate-800 hover:bg-blue-600/30 border border-slate-700 hover:border-blue-500 rounded-xl transition-all text-slate-200 font-medium";
                    b.onclick = () => {
                        fDiv.classList.remove('hidden');
                        if (opt === quiz.a || opt.includes(quiz.a) || quiz.a.includes(opt)) {
                            fDiv.innerText = "✨ 答對了！";
                            fDiv.className = "mt-6 p-4 rounded-xl text-center font-bold bg-green-500/20 text-green-400 border border-green-500/30 animate-pop";
                        } else {
                            fDiv.innerText = "❌ 答錯了，答案是：" + quiz.a;
                            fDiv.className = "mt-6 p-4 rounded-xl text-center font-bold bg-red-500/20 text-red-400 border border-red-500/30 animate-pop";
                        }
                        btn.disabled = false;
                        btn.innerText = "下一題挑戰 ➡️";
                    };
                    oDiv.appendChild(b);
                });

            } catch (err) {
                btn.disabled = false;
                btn.innerText = "重試一次";
                alert("AI 稍微卡住了，請再按一次！");
            }
        }
    </script>
</body>
</html>
